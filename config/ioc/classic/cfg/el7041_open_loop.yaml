axis:
  id: ${AXIS_ID=1}

epics:
  name: ${AX_NAME=M1}
  precision: 3
  description: EL7041-0052 open-loop stepper
  unit: mm
  motorRecord:
    fieldInit: 'RTRY=0,FOFF=Frozen'

drive:
  numerator: 7200
  denominator: 32768
  type: 0
  setpoint: ec0.s$(DRV_SID).velocitySetpoint01
  control: ec0.s$(DRV_SID).driveControl01
  enable: 0
  reset: 1
  reduceTorque: 2
  reduceTorqueEnable: true
  status: ec0.s$(DRV_SID).driveStatus01
  enabled: 1
  warning: 2
  error:
    - 3
    - 7
    - 14

encoder:
  desc: Open loop
  numerator: 360
  denominator: 12800
  type: 0
  bits: 16
  absBits: 0
  position: ec0.s$(ENC_SID).positionActual${ENC_CH=01}
  status: ec0.s$(ENC_SID).encoderStatus${ENC_CH=01}

controller:
  Kp: 1
  Ki: 0
  Kd: 0

trajectory:
  type: 1
  axis:
    velocity: 720
    acceleration: 3600
    deceleration: 3600
    emergencyDeceleration: 7200
    jerk: 7200
  jog:
    velocity: 1

input:
  limit:
    forward: ec0.s$(DRV_SID).ONE.0
    backward: ec0.s$(DRV_SID).ONE.0
  home: 'ec0.s$(DRV_SID).ONE.0'
  interlock: 'ec0.s$(DRV_SID).ONE.0'

softlimits:
  enable: false
  forward: 100
  forwardEnable: false
  backward: -100
  backwardEnable: false

monitoring:
  lag:
    enable: true
    tolerance: 10
    time: 100
  velocity:
    enable: false
    max: 8
    time:
      trajectory: 100
      drive: 200
  target:
    enable: true
    tolerance: 0.1
    time: 10
